<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worksheet — Chapter 1: Nouns</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/print.css">

  <!-- Google Analytics -->
  <script src="../js/analytics.js"></script>

  <style>
    @media screen {
      body { background: var(--color-bg); }
      .worksheet-page { max-width: 800px; margin: var(--space-8) auto; background: white; padding: var(--space-8); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
      .screen-controls { max-width: 800px; margin: var(--space-4) auto var(--space-8); text-align: center; }
    }
    @media print {
      .screen-controls { display: none !important; }
      .worksheet-page { margin: 0; padding: 0; box-shadow: none; border-radius: 0; }
    }
    .ws-question { margin-bottom: 12pt; page-break-inside: avoid; }
    .ws-question .q-num { font-weight: 700; color: #0369A1; margin-right: 4pt; }
    .ws-answer-line { display: block; width: 100%; height: 28pt; border-bottom: 1px dotted #999; margin-top: 4pt; }
    .ws-answer-short { display: inline-block; width: 120pt; border-bottom: 1px dotted #999; margin: 0 6pt; text-align: center; }
    .ws-section { margin-bottom: 18pt; page-break-inside: avoid; }
    .ws-section h3 { font-size: 12pt; font-weight: 700; padding: 4pt 8pt; background: #f0f0f0; border-left: 4pt solid #0369A1; margin-bottom: 10pt; color: #000; font-family: 'Nunito', sans-serif; }
    .ws-header { text-align: center; border-bottom: 2px solid #0369A1; padding-bottom: 8pt; margin-bottom: 12pt; }
    .ws-header h1 { font-family: 'Fredoka One', cursive; font-size: 18pt; color: #0369A1; margin-bottom: 2pt; }
    .ws-header .subtitle { font-size: 11pt; color: #666; }
    .ws-student-info { display: flex; justify-content: space-between; margin-bottom: 14pt; font-size: 10pt; }
    .ws-student-info .field { display: flex; align-items: baseline; gap: 6pt; }
    .ws-student-info .line { display: inline-block; width: 140pt; border-bottom: 1px solid #000; }
    .ws-answer-key { page-break-before: always; }
    .ws-answer-key h2 { text-align: center; font-size: 14pt; margin-bottom: 12pt; font-family: 'Fredoka One', cursive; color: #0369A1; }
    .ws-answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3pt 16pt; font-size: 10pt; }
    .ws-answers-grid .ans-item { padding: 2pt 0; border-bottom: 1px dotted #ddd; }
    .ws-answers-grid .ans-num { font-weight: 700; color: #0369A1; }
    .ws-footer { text-align: center; font-size: 8pt; color: #999; margin-top: 20pt; padding-top: 6pt; border-top: 1px solid #eee; }
  </style>
</head>
<body>

<div class="screen-controls no-print">
  <a href="../chapters/en02-nouns.html" class="btn btn-outline btn-sm">← Back to Chapter 2: Nouns</a>
  <button class="btn btn-lg" style="background: linear-gradient(135deg, #0369A1, #38BDF8); color: white; margin-left: 16px;" onclick="window.print()">🖨️ Print Worksheet</button>
  <button class="btn btn-sm" style="background: var(--color-accent); color: var(--color-primary-dark); margin-left: 16px;" onclick="location.reload()">🔄 New Questions</button>
  <p style="margin-top: 8px; color: var(--color-text-light); font-size: var(--text-sm);">Each reload generates different questions.</p>
</div>

<div class="worksheet-page" id="worksheet"></div>

<script>
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(arr,n) { return shuffle(arr).slice(0,n); }
function formatDate() { const d=new Date(); const m=['January','February','March','April','May','June','July','August','September','October','November','December']; return `${String(d.getDate()).padStart(2,'0')} ${m[d.getMonth()]} ${d.getFullYear()}`; }

function generate() {
  const answers = {};
  let qn = 0;

  // Section A: Classify nouns
  const classifyNouns = shuffle([
    {w:'Bahrain',t:'Proper'},{w:'happiness',t:'Abstract'},{w:'cotton',t:'Material'},{w:'team',t:'Collective'},
    {w:'river',t:'Common'},{w:'Monday',t:'Proper'},{w:'courage',t:'Abstract'},{w:'gold',t:'Material'},
    {w:'flock',t:'Collective'},{w:'mountain',t:'Common'},{w:'freedom',t:'Abstract'},{w:'iron',t:'Material'},
    {w:'army',t:'Collective'},{w:'teacher',t:'Common'},{w:'honesty',t:'Abstract'},{w:'Crislyn',t:'Proper'},
  ]).slice(0,8);
  let secA = classifyNouns.map((n,i)=>{ qn++; answers[`A${i+1}`]=n.t; return `<div class="ws-question"><span class="q-num">${qn}.</span> ${n.w} → <span class="ws-answer-short"></span></div>`; }).join('');

  // Section B: Plural
  const plurals = shuffle([
    {s:'cat',p:'cats'},{s:'bus',p:'buses'},{s:'baby',p:'babies'},{s:'leaf',p:'leaves'},
    {s:'child',p:'children'},{s:'box',p:'boxes'},{s:'wolf',p:'wolves'},{s:'mouse',p:'mice'},
    {s:'tooth',p:'teeth'},{s:'dish',p:'dishes'},{s:'tomato',p:'tomatoes'},{s:'knife',p:'knives'},
    {s:'sheep',p:'sheep'},{s:'man',p:'men'},{s:'story',p:'stories'},{s:'city',p:'cities'},
    {s:'foot',p:'feet'},{s:'goose',p:'geese'},{s:'key',p:'keys'},{s:'boy',p:'boys'},
  ]).slice(0,10);
  let secB = plurals.map((w,i)=>{ qn++; answers[`B${i+1}`]=w.p; return `<div class="ws-question"><span class="q-num">${qn}.</span> ${w.s} → <span class="ws-answer-short"></span></div>`; }).join('');

  // Section C: Countable or Uncountable
  const cuNouns = shuffle([
    {w:'apple',t:'C'},{w:'water',t:'U'},{w:'chair',t:'C'},{w:'rice',t:'U'},
    {w:'milk',t:'U'},{w:'pencil',t:'C'},{w:'sugar',t:'U'},{w:'furniture',t:'U'},
    {w:'egg',t:'C'},{w:'bread',t:'U'},{w:'dog',t:'C'},{w:'homework',t:'U'},
  ]).slice(0,8);
  let secC = cuNouns.map((n,i)=>{ qn++; answers[`C${i+1}`]=n.t==='C'?'Countable':'Uncountable'; return `<div class="ws-question"><span class="q-num">${qn}.</span> ${n.w} → <span class="ws-answer-short"></span></div>`; }).join('');

  // Section D: Possessive
  const poss = shuffle([
    {p:'the book of the girl',a:"the girl's book"},{p:'the toys of the children',a:"the children's toys"},
    {p:'the car of the teacher',a:"the teacher's car"},{p:'the room of the boys',a:"the boys' room"},
    {p:'the tail of the dog',a:"the dog's tail"},{p:'the shoes of the men',a:"the men's shoes"},
  ]).slice(0,4);
  let secD = poss.map((item,i)=>{ qn++; answers[`D${i+1}`]=item.a; return `<div class="ws-question"><span class="q-num">${qn}.</span> ${item.p}<span class="ws-answer-line"></span></div>`; }).join('');

  // Section E: Collective nouns
  const coll = shuffle([
    {g:'birds',a:'flock'},{g:'wolves',a:'pack'},{g:'bees',a:'swarm'},
    {g:'fish',a:'school'},{g:'flowers',a:'bouquet'},{g:'grapes',a:'bunch'},
    {g:'players',a:'team'},{g:'elephants',a:'herd'},{g:'lions',a:'pride'},
  ]).slice(0,6);
  let secE = coll.map((c,i)=>{ qn++; answers[`E${i+1}`]=c.a; return `<div class="ws-question"><span class="q-num">${qn}.</span> a <span class="ws-answer-short"></span> of ${c.g}</div>`; }).join('');

  // Section F: Abstract noun from sentence
  const abst = shuffle([
    {s:'Her kindness made everyone smile.',a:'kindness'},
    {s:'Honesty is the best policy.',a:'honesty'},
    {s:'The children showed great courage.',a:'courage'},
    {s:'Freedom is precious to every nation.',a:'freedom'},
    {s:'His anger surprised us all.',a:'anger'},
    {s:'Truth always wins in the end.',a:'truth'},
  ]).slice(0,4);
  let secF = abst.map((item,i)=>{ qn++; answers[`F${i+1}`]=item.a; return `<div class="ws-question"><span class="q-num">${qn}.</span> "${item.s}"<br>Abstract noun: <span class="ws-answer-short"></span></div>`; }).join('');

  // Answer key
  let ansHTML = '<div class="ws-answers-grid">';
  Object.entries(answers).forEach(([k,v])=>{ ansHTML += `<div class="ans-item"><span class="ans-num">${k}:</span> ${v}</div>`; });
  ansHTML += '</div>';

  document.getElementById('worksheet').innerHTML = `
    <div class="ws-header">
      <h1>Crislyn's English Adventure</h1>
      <div class="subtitle">Chapter 1: Nouns — Practice Worksheet</div>
    </div>
    <div class="ws-student-info">
      <div class="field"><strong>Name:</strong> <span class="line"></span></div>
      <div class="field"><strong>Date:</strong> <span class="line" style="width:100pt;"></span></div>
      <div class="field"><strong>Score:</strong> <span class="line" style="width:60pt;"></span></div>
    </div>
    <div class="ws-section"><h3>Section A: Classify the Noun (Common / Proper / Collective / Abstract / Material)</h3>${secA}</div>
    <div class="ws-section"><h3>Section B: Write the Plural Form</h3>${secB}</div>
    <div class="ws-section"><h3>Section C: Countable or Uncountable?</h3>${secC}</div>
    <div class="ws-section"><h3>Section D: Rewrite Using Possessive Form</h3>${secD}</div>
    <div class="ws-section"><h3>Section E: Fill in the Collective Noun</h3>${secE}</div>
    <div class="ws-section"><h3>Section F: Find the Abstract Noun</h3>${secF}</div>
    <div class="ws-footer">Crislyn's English Adventure — Generated on ${formatDate()}</div>
    <div class="ws-answer-key"><h2>Answer Key</h2>${ansHTML}</div>
  `;
}

document.addEventListener('DOMContentLoaded', generate);
</script>

</body>
</html>
