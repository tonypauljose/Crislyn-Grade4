<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worksheet — पाठ 1: संज्ञा</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&family=Tiro+Devanagari+Hindi&family=Hind:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/print.css">

  <!-- Google Analytics -->
  <script src="../js/analytics.js"></script>
  <style>
    @media screen {
      body { background: var(--color-bg); }
      .worksheet-page { max-width: 800px; margin: var(--space-8) auto; background: white; padding: var(--space-8); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
      .screen-controls { max-width: 800px; margin: var(--space-4) auto var(--space-8); text-align: center; }
    }
    @media print { .screen-controls { display: none !important; } .worksheet-page { margin:0; padding:0; box-shadow:none; } }
    .hi { font-family: 'Tiro Devanagari Hindi', 'Hind', serif; }
    .ws-question { margin-bottom: 12pt; page-break-inside: avoid; }
    .ws-question .q-num { font-weight: 700; color: #D97706; margin-right: 4pt; }
    .ws-answer-line { display: block; width: 100%; height: 28pt; border-bottom: 1px dotted #999; margin-top: 4pt; }
    .ws-answer-short { display: inline-block; width: 140pt; border-bottom: 1px dotted #999; margin: 0 6pt; text-align: center; font-family: 'Tiro Devanagari Hindi', serif; }
    .ws-section { margin-bottom: 18pt; page-break-inside: avoid; }
    .ws-section h3 { font-size: 12pt; font-weight: 700; padding: 4pt 8pt; background: #FEF3C7; border-left: 4pt solid #D97706; margin-bottom: 10pt; color: #000; font-family: 'Nunito', sans-serif; }
    .ws-section h3 .hi { font-size: 14pt; }
    .ws-header { text-align: center; border-bottom: 2px solid #D97706; padding-bottom: 8pt; margin-bottom: 12pt; }
    .ws-header h1 { font-family: 'Fredoka One', cursive; font-size: 18pt; color: #B45309; margin-bottom: 2pt; }
    .ws-header h1 .hi { font-family: 'Tiro Devanagari Hindi', serif; display: block; font-size: 22pt; }
    .ws-header .subtitle { font-size: 11pt; color: #666; }
    .ws-student-info { display: flex; justify-content: space-between; margin-bottom: 14pt; font-size: 10pt; }
    .ws-student-info .field { display: flex; align-items: baseline; gap: 6pt; }
    .ws-student-info .line { display: inline-block; width: 140pt; border-bottom: 1px solid #000; }
    .ws-answer-key { page-break-before: always; }
    .ws-answer-key h2 { text-align: center; font-size: 14pt; margin-bottom: 12pt; font-family: 'Fredoka One', cursive; color: #B45309; }
    .ws-answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3pt 16pt; font-size: 10pt; }
    .ws-answers-grid .ans-item { padding: 2pt 0; border-bottom: 1px dotted #ddd; }
    .ws-answers-grid .ans-num { font-weight: 700; color: #D97706; }
    .ws-footer { text-align: center; font-size: 8pt; color: #999; margin-top: 20pt; padding-top: 6pt; border-top: 1px solid #eee; }
    .word-box { display: inline-block; padding: 4pt 10pt; border: 1px solid #999; border-radius: 4pt; margin: 2pt; font-family: 'Tiro Devanagari Hindi', serif; font-size: 13pt; }
    .options-line { background: #FEF3C7; padding: 6pt 10pt; border-radius: 4pt; margin: 6pt 0; font-family: 'Tiro Devanagari Hindi', serif; }
  </style>
</head>
<body>
<div class="screen-controls no-print">
  <a href="../chapters/hi01-sangya.html" class="btn btn-outline btn-sm">← Back to Chapter 1</a>
  <button class="btn btn-lg" style="background: linear-gradient(135deg, #B45309, #FBBF24); color: white; margin-left: 16px;" onclick="window.print()">🖨️ Print Worksheet</button>
  <button class="btn btn-sm" style="background: var(--color-accent); color: var(--color-primary-dark); margin-left: 16px;" onclick="location.reload()">🔄 New Questions</button>
  <p style="margin-top: 8px; color: var(--color-text-light); font-size: var(--text-sm);">Each reload generates different questions.</p>
</div>
<div class="worksheet-page" id="worksheet"></div>
<script>
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function formatDate(){const d=new Date();const m=['January','February','March','April','May','June','July','August','September','October','November','December'];return`${String(d.getDate()).padStart(2,'0')} ${m[d.getMonth()]} ${d.getFullYear()}`;}

const WORDS = [
  { hi: 'माँ', en: 'Mother', type: 'व्यक्ति' },
  { hi: 'भाई', en: 'Brother', type: 'व्यक्ति' },
  { hi: 'बहन', en: 'Sister', type: 'व्यक्ति' },
  { hi: 'लड़का', en: 'Boy', type: 'व्यक्ति' },
  { hi: 'लड़की', en: 'Girl', type: 'व्यक्ति' },
  { hi: 'राजा', en: 'King', type: 'व्यक्ति' },
  { hi: 'रानी', en: 'Queen', type: 'व्यक्ति' },
  { hi: 'हाथी', en: 'Elephant', type: 'प्राणी' },
  { hi: 'कुत्ता', en: 'Dog', type: 'प्राणी' },
  { hi: 'बिल्ली', en: 'Cat', type: 'प्राणी' },
  { hi: 'बंदर', en: 'Monkey', type: 'प्राणी' },
  { hi: 'कौआ', en: 'Crow', type: 'प्राणी' },
  { hi: 'तोता', en: 'Parrot', type: 'प्राणी' },
  { hi: 'मछली', en: 'Fish', type: 'प्राणी' },
  { hi: 'तितली', en: 'Butterfly', type: 'प्राणी' },
  { hi: 'भारत', en: 'India', type: 'स्थान' },
  { hi: 'दिल्ली', en: 'Delhi', type: 'स्थान' },
  { hi: 'घर', en: 'Home', type: 'स्थान' },
  { hi: 'स्कूल', en: 'School', type: 'स्थान' },
  { hi: 'बाज़ार', en: 'Market', type: 'स्थान' },
  { hi: 'ताजमहल', en: 'Taj Mahal', type: 'स्थान' },
  { hi: 'खेत', en: 'Farm', type: 'स्थान' },
  { hi: 'किताब', en: 'Book', type: 'वस्तु' },
  { hi: 'कुर्सी', en: 'Chair', type: 'वस्तु' },
  { hi: 'मेज़', en: 'Table', type: 'वस्तु' },
  { hi: 'गेंद', en: 'Ball', type: 'वस्तु' },
  { hi: 'पेंसिल', en: 'Pencil', type: 'वस्तु' },
  { hi: 'साईकिल', en: 'Bicycle', type: 'वस्तु' },
  { hi: 'दूध', en: 'Milk', type: 'वस्तु' },
  { hi: 'आम', en: 'Mango', type: 'वस्तु' },
  { hi: 'पतंग', en: 'Kite', type: 'वस्तु' },
];

function generate(){
  const answers={};
  let qn=0;

  // Section A: Classify (choose the type)
  const classifyItems = shuffle(WORDS).slice(0, 10);
  let secA = classifyItems.map((w,i) => {
    qn++; answers[`A${i+1}`] = `${w.type} (${w.en})`;
    return `<div class="ws-question"><span class="q-num">${qn}.</span> <span class="hi" style="font-size:14pt;">${w.hi}</span> <span style="font-size:9pt; color:#666;">(${w.en})</span> → <span class="ws-answer-short"></span></div>`;
  }).join('');

  // Section B: Hindi to English translation
  const h2eItems = shuffle(WORDS).slice(0, 8);
  let secB = h2eItems.map((w,i) => {
    qn++; answers[`B${i+1}`] = w.en;
    return `<div class="ws-question"><span class="q-num">${qn}.</span> <span class="hi" style="font-size:14pt;">${w.hi}</span> → <span class="ws-answer-short" style="font-family:'Nunito',sans-serif;"></span></div>`;
  }).join('');

  // Section C: English to Hindi
  const e2hItems = shuffle(WORDS).slice(0, 8);
  let secC = e2hItems.map((w,i) => {
    qn++; answers[`C${i+1}`] = w.hi;
    return `<div class="ws-question"><span class="q-num">${qn}.</span> ${w.en} → <span class="ws-answer-short"></span></div>`;
  }).join('');

  // Section D: Fill in the blank (workbook style)
  const fillSentences = shuffle([
    { sent: 'मुझे ___ खाना पसंद है।', en: 'I like to eat ___', ans: 'आम', wrong: ['किताब', 'कुर्सी'] },
    { sent: 'बंदर ___ पर चढ़ रहा है।', en: 'The monkey climbs on the ___', ans: 'पेड़', wrong: ['दूध', 'स्कूल'] },
    { sent: 'छत पर ___ बैठा है।', en: 'A ___ sits on the roof', ans: 'कौआ', wrong: ['पतंग', 'भारत'] },
    { sent: 'माँ ___ बना रही है।', en: 'Mother is making ___', ans: 'खाना', wrong: ['साईकिल', 'गेंद'] },
    { sent: 'रानी ___ पढ़ रही है।', en: 'Rani is reading a ___', ans: 'किताब', wrong: ['हाथी', 'पतंग'] },
    { sent: 'गाय ___ देती है।', en: 'The cow gives ___', ans: 'दूध', wrong: ['स्कूल', 'घर'] },
    { sent: 'मैं कल ___ जाऊँगा।', en: 'Tomorrow I will go to ___', ans: 'दिल्ली', wrong: ['आम', 'तोता'] },
    { sent: 'लड़का ___ से खेल रहा है।', en: 'The boy plays with a ___', ans: 'गेंद', wrong: ['माँ', 'भारत'] },
  ]).slice(0, 6);
  let secD = fillSentences.map((s, i) => {
    qn++; answers[`D${i+1}`] = s.ans;
    const options = shuffle([s.ans, ...s.wrong]);
    return `<div class="ws-question"><span class="q-num">${qn}.</span>
      <span class="hi" style="font-size:13pt;">${s.sent.replace('___','<span class="ws-answer-short" style="width:120pt;"></span>')}</span>
      <div class="options-line">Options: ${options.map(o => `<span class="word-box">${o}</span>`).join(' ')}</div>
    </div>`;
  }).join('');

  // Section E: Pick the noun from sentence
  const findSentences = shuffle([
    { sent: 'तारे चमक रहे हैं।', noun: 'तारे' },
    { sent: 'पिंजरे में तोता है।', noun: 'तोता' },
    { sent: 'राधा बाहर गई है।', noun: 'राधा' },
    { sent: 'मेज़ पर किताब है।', noun: 'किताब (या मेज़)' },
    { sent: 'किसान खेत में काम करता है।', noun: 'किसान (या खेत)' },
    { sent: 'बगीचे में बहुत से फूल हैं।', noun: 'फूल (या बगीचे)' },
    { sent: 'मैंने आइसक्रीम खाई।', noun: 'आइसक्रीम' },
  ]).slice(0, 5);
  let secE = findSentences.map((s, i) => {
    qn++; answers[`E${i+1}`] = s.noun;
    return `<div class="ws-question"><span class="q-num">${qn}.</span>
      <span class="hi" style="font-size:13pt;">${s.sent}</span>
      <br>Noun (संज्ञा): <span class="ws-answer-short"></span>
    </div>`;
  }).join('');

  // Section F: Write your own
  let secF = `
    <div class="ws-question"><span class="q-num">${++qn}.</span> Write 2 <strong>व्यक्ति (person)</strong> nouns in Hindi:<br>
    <span class="ws-answer-short"></span> <span class="ws-answer-short"></span></div>
    <div class="ws-question"><span class="q-num">${++qn}.</span> Write 2 <strong>प्राणी (animal)</strong> nouns in Hindi:<br>
    <span class="ws-answer-short"></span> <span class="ws-answer-short"></span></div>
    <div class="ws-question"><span class="q-num">${++qn}.</span> Write 2 <strong>स्थान (place)</strong> nouns in Hindi:<br>
    <span class="ws-answer-short"></span> <span class="ws-answer-short"></span></div>
    <div class="ws-question"><span class="q-num">${++qn}.</span> Write 2 <strong>वस्तु (thing)</strong> nouns in Hindi:<br>
    <span class="ws-answer-short"></span> <span class="ws-answer-short"></span></div>
  `;
  answers[`F1`] = 'e.g. माँ, पिता, भाई, बहन, लड़का, लड़की, राजा, रानी';
  answers[`F2`] = 'e.g. हाथी, कुत्ता, बंदर, तोता, मछली, तितली, कौआ';
  answers[`F3`] = 'e.g. भारत, दिल्ली, घर, स्कूल, बाज़ार, ताजमहल';
  answers[`F4`] = 'e.g. किताब, कुर्सी, मेज़, गेंद, पेंसिल, साईकिल, दूध, आम';

  let ansHTML='<div class="ws-answers-grid">';
  Object.entries(answers).forEach(([k,v])=>{ansHTML+=`<div class="ans-item"><span class="ans-num">${k}:</span> ${v}</div>`;});
  ansHTML+='</div>';

  document.getElementById('worksheet').innerHTML = `
    <div class="ws-header">
      <h1><span class="hi">संज्ञा</span>Crislyn's Hindi Adventure</h1>
      <div class="subtitle">पाठ 1 · Chapter 1: Sangya (Noun) — Practice Worksheet</div>
    </div>
    <div class="ws-student-info">
      <div class="field"><strong>Name:</strong> <span class="line"></span></div>
      <div class="field"><strong>Date:</strong> <span class="line" style="width:100pt;"></span></div>
      <div class="field"><strong>Score:</strong> <span class="line" style="width:60pt;"></span></div>
    </div>
    <div class="ws-section"><h3><span class="hi">अभ्यास 1</span> · Section A: Classify the Noun (व्यक्ति / प्राणी / स्थान / वस्तु)</h3>${secA}</div>
    <div class="ws-section"><h3><span class="hi">अभ्यास 2</span> · Section B: Write English Meaning</h3>${secB}</div>
    <div class="ws-section"><h3><span class="hi">अभ्यास 3</span> · Section C: Write Hindi Word</h3>${secC}</div>
    <div class="ws-section"><h3><span class="hi">अभ्यास 4</span> · Section D: Fill in the Blank (खाली स्थान भरो)</h3>${secD}</div>
    <div class="ws-section"><h3><span class="hi">अभ्यास 5</span> · Section E: Find the Noun in the Sentence</h3>${secE}</div>
    <div class="ws-section"><h3><span class="hi">अभ्यास 6</span> · Section F: Write Your Own Nouns</h3>${secF}</div>
    <div class="ws-footer">Crislyn's Hindi Adventure — Generated on ${formatDate()}</div>
    <div class="ws-answer-key"><h2>Answer Key · उत्तर कुंजी</h2>${ansHTML}</div>
  `;
}
document.addEventListener('DOMContentLoaded', generate);
</script>
</body>
</html>
