<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English — Crislyn's Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/pixie.css">

  <!-- Google Analytics -->
  <script src="js/analytics.js"></script>
  <script src="js/state.js" defer></script>
  <script src="js/pixie.js" defer></script>

  <style>
    .navbar {
      background: var(--color-surface); box-shadow: var(--shadow-sm);
      padding: var(--space-3) 0; position: sticky; top: 0; z-index: 100;
    }
    .navbar .container { display: flex; align-items: center; justify-content: space-between; }
    .nav-brand {
      display: flex; align-items: center; gap: var(--space-2);
      font-family: var(--font-heading); font-size: var(--text-lg); color: var(--color-primary-dark);
    }
    .nav-links { display: flex; gap: var(--space-2); }
    .nav-link {
      padding: var(--space-2) var(--space-4); border-radius: var(--radius-full);
      font-weight: 700; font-size: var(--text-sm); color: var(--color-text-light);
      transition: all var(--duration-normal) var(--ease-smooth);
    }
    .nav-link:hover, .nav-link.active { background: var(--color-bg-alt); color: var(--color-primary); }

    .page-hero {
      background: linear-gradient(135deg, #0369A1 0%, #0284C7 40%, #38BDF8 100%);
      color: white; padding: var(--space-10) 0; text-align: center;
      position: relative; overflow: hidden;
    }
    .page-hero::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .page-hero > .container { position: relative; z-index: 1; }
    .page-hero h1 { color: white; margin-bottom: var(--space-2); }
    .page-hero p { opacity: 0.9; font-size: var(--text-lg); margin-bottom: 0; }
    .page-hero .breadcrumb { font-size: var(--text-sm); opacity: 0.8; margin-bottom: var(--space-3); }
    .page-hero .breadcrumb a { color: rgba(255,255,255,0.9); }
    .page-hero .breadcrumb a:hover { color: white; }

    .chapters-section { padding: var(--space-10) 0; }

    .chapters-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--space-6);
    }

    .chapter-card {
      padding: var(--space-6); text-align: center; position: relative;
    }
    .chapter-card .chapter-emoji { font-size: 3rem; margin-bottom: var(--space-3); display: block; }
    .chapter-card .chapter-title {
      font-family: var(--font-heading); font-size: var(--text-lg); margin-bottom: var(--space-2);
    }
    .chapter-card .chapter-desc {
      font-size: var(--text-sm); color: var(--color-text-light); margin-bottom: var(--space-4);
    }
    .chapter-card.available { border: 2px solid #93C5FD; }
    .chapter-card.available:hover { border-color: #3B82F6; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
    .chapter-card.locked { opacity: 0.55; pointer-events: none; }
    .chapter-card.locked .chapter-emoji { filter: grayscale(0.8); }

    .chapter-card .chapter-number {
      position: absolute; top: var(--space-3); right: var(--space-3);
      width: 36px; height: 36px; border-radius: var(--radius-full);
      background: #0284C7; color: white; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: var(--text-sm);
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: var(--space-1);
      padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 700;
    }
    .status-badge.ready { background: #DCFCE7; color: #166534; }
    .status-badge.coming { background: #F0F9FF; color: #64748B; }

    .tip-section { padding: var(--space-6) 0 var(--space-10); }
    .tip-card {
      background: linear-gradient(135deg, #BFDBFE, #93C5FD);
      border-radius: var(--radius-xl); padding: var(--space-6);
      text-align: center; max-width: 700px; margin: 0 auto; color: #1E3A5F;
    }
    .tip-card h3 { color: #0C4A6E; margin-bottom: var(--space-2); }
    .tip-card .tip-text { font-size: var(--text-lg); font-weight: 600; }

    .footer {
      text-align: center; padding: var(--space-6) 0; color: var(--color-text-light);
      font-size: var(--text-sm); border-top: 1px solid var(--color-border-light);
    }

    @media (max-width: 768px) { .chapters-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .chapters-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-brand"><span>✨</span> Crislyn's Portal</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="learning.html" class="nav-link active">Learning</a>
    </div>
  </div>
</nav>

<!-- Page Hero -->
<div class="page-hero">
  <div class="container">
    <div class="breadcrumb fade-in">
      <a href="index.html">Home</a> → <a href="learning.html">Learning</a> → English
    </div>
    <h1 class="fade-in-up">📝 English</h1>
    <p class="fade-in-up delay-1">Grammar, Writing, and Creative Thinking · 11 Chapters</p>
  </div>
</div>

<!-- Chapters -->
<div class="chapters-section">
  <div class="container">
    <div class="section-header mb-8">
      <h2>Chapters</h2>
      <p>Click on an available chapter to start learning!</p>
    </div>
    <div class="chapters-grid" id="chapters-grid"></div>
  </div>
</div>

<!-- Daily Tip -->
<div class="tip-section">
  <div class="container">
    <div class="tip-card fade-in-up">
      <h3>💡 Daily English Tip</h3>
      <div class="tip-text" id="daily-tip"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="container">
    <p>Made with ❤️ for Crislyn · crislyntony.com</p>
  </div>
</div>

<script>
const chapters = [
  { num: 1, title: 'Kinds of Sentences', emoji: '📝', desc: 'Declarative, interrogative, exclamatory, and imperative sentences.', status: 'available', link: 'chapters/en01-sentences.html' },
  { num: 2, title: 'Nouns', emoji: '📦', desc: 'Common, proper, collective, abstract nouns. Singular, plural, and possessive forms.', status: 'available', link: 'chapters/en02-nouns.html' },
  { num: 3, title: 'Adjectives', emoji: '🎨', desc: 'Descriptive, quantitative, demonstrative adjectives. Degrees of comparison.', status: 'coming' },
  { num: 4, title: 'Conjunctions', emoji: '🔗', desc: 'Joining words: and, but, or, because, although, when, if, while.', status: 'coming' },
  { num: 5, title: 'Story Writing', emoji: '📖', desc: 'Write stories with beginning, middle, and end — characters, plot, and moral.', status: 'coming' },
  { num: 6, title: 'Verbs', emoji: '💪', desc: 'Action words, helping verbs, main verbs, transitive and intransitive verbs.', status: 'coming' },
  { num: 7, title: 'Adverbs', emoji: '🏃', desc: 'Words that describe verbs — how, when, where, how often, how much.', status: 'coming' },
  { num: 8, title: 'Paragraph Writing', emoji: '✍️', desc: 'Writing clear paragraphs with topic sentence, body, and conclusion.', status: 'coming' },
  { num: 9, title: 'Tenses', emoji: '⏰', desc: 'Present, past, and future tenses. Identify and convert between tenses.', status: 'coming' },
  { num: 10, title: 'Letter Writing', emoji: '✉️', desc: 'Formal and informal letters — format, greeting, body, and closing.', status: 'coming' },
  { num: 11, title: 'Tenses Continued', emoji: '⏳', desc: 'Continuous and perfect tenses. Advanced tense usage and conversion.', status: 'coming' },
];

function renderChapters() {
  const grid = document.getElementById('chapters-grid');
  grid.innerHTML = chapters.map((ch, i) => {
    const isAvailable = ch.status === 'available';
    const cardClass = isAvailable ? 'card chapter-card available card-interactive fade-in-up' : 'card chapter-card locked fade-in-up';
    const delay = `delay-${Math.min(i + 1, 8)}`;
    const statusBadge = isAvailable
      ? '<span class="status-badge ready">✅ Ready</span>'
      : '<span class="status-badge coming">🔒 Coming Soon</span>';
    const onclick = isAvailable ? `onclick="window.location.href='${ch.link}'"` : '';

    return `
      <div class="${cardClass} ${delay}" ${onclick}>
        <div class="chapter-number">${ch.num}</div>
        <span class="chapter-emoji">${ch.emoji}</span>
        <div class="chapter-title">${ch.title}</div>
        <div class="chapter-desc">${ch.desc}</div>
        ${statusBadge}
      </div>
    `;
  }).join('');
}

const tips = [
  "A noun is a naming word — it names a person, place, thing, or idea!",
  "Adjectives are describing words. 'The TALL girl wore a RED dress.' — tall and red are adjectives!",
  "Remember: proper nouns always start with a capital letter. Crislyn, Bahrain, Monday!",
  "An adverb tells you HOW, WHEN, WHERE, or HOW OFTEN something happens.",
  "Conjunctions are joining words — they connect two ideas: 'I was tired BUT I kept playing.'",
  "'She sings beautifully.' — 'beautifully' is an adverb describing HOW she sings.",
  "In reported speech, 'am' becomes 'was', 'is' becomes 'was', 'will' becomes 'would'.",
  "A collective noun names a GROUP: a flock of birds, a bunch of grapes, a team of players.",
  "Transitive verbs need an object: 'She kicked the ball.' Intransitive don't: 'She laughed.'",
  "Every story has three parts: a beginning (setup), a middle (problem), and an end (solution)!",
];

function showDailyTip() {
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  document.getElementById('daily-tip').textContent = tips[dayOfYear % tips.length];
}

document.addEventListener('DOMContentLoaded', () => { renderChapters(); showDailyTip(); });
</script>

</body>
</html>
